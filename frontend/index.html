<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUKAI</title>
    <link rel="icon" type="image/png" sizes="256x256" href="/brand/favicon-256.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/brand/favicon-128.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/brand/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png" />
  </head>
  <body>
    <div id="root">
      <div id="bootstrap-reset-shell" class="reset-fallback-shell" hidden>
        <div class="reset-fallback-panel">
          <div class="brand">
            <img src="/brand/mukai-logo.png" alt="MUKAI - Music to Karaoke AI Creator" />
            <div class="brand-copy"><strong>MUKAI</strong><span>Music to Karaoke AI Creator</span></div>
          </div>
          <p>Nie udało się uruchomić interfejsu.</p>
          <button id="bootstrap-reset-button" class="button ghost danger full" type="button">Od nowa</button>
        </div>
      </div>
    </div>
    <script>
      (() => {
        const storageKey = "mukai.processingState.v1";
        const rawState = (() => {
          try { return window.localStorage.getItem(storageKey); } catch { return null; }
        })();
        if (!rawState) return;
        document.getElementById("bootstrap-reset-shell").hidden = false;
        document.getElementById("bootstrap-reset-button").addEventListener("click", async () => {
          if (!window.confirm("Zacząć od nowa? Wszystkie dane bieżącego projektu zostaną usunięte.")) return;
          let state = {};
          try { state = JSON.parse(rawState); } catch { state = {}; }
          const payload = {
            jobId: state.job?.jobId ?? null,
            uploadDraftId: state.inspection?.uploadDraftId ?? null,
          };
          try { window.localStorage.clear(); } catch {}
          try { window.sessionStorage.clear(); } catch {}
          try {
            if ("caches" in window) {
              const names = await window.caches.keys();
              await Promise.all(names.map((name) => window.caches.delete(name)));
            }
            if (payload.jobId || payload.uploadDraftId) {
              const controller = new AbortController();
              const timeout = window.setTimeout(() => controller.abort(), 5000);
              try {
                await fetch("/api/reset", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(payload),
                  keepalive: true,
                  signal: controller.signal,
                });
              } finally {
                window.clearTimeout(timeout);
              }
            }
          } finally {
            window.location.replace(window.location.pathname);
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
